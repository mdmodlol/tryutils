# .archon/workflows/add-tool-or-feature.yaml
name: 安全维护或主线功能迭代（TryUtils 专用）
description: 按照 CLAUDE.md + PROJECT-RULES.md + plans/TASK-PLAN-TEMPLATE.md 执行 TryUtils 的安全维护、主线功能迭代与回归保护

nodes:
  - id: start
    type: prompt
    prompt: |
      先读取以下文件：
      1. CLAUDE.md（Harness 核心规范）
      2. docs/session-state.md（当前状态）
      3. docs/PROJECT-RULES.md（完整项目规则）
      总结当前项目主线、风险边界和本次任务目标。

  - id: plan
    depends_on: [start]
    type: prompt
    prompt: |
      在 plans/ 下创建或更新本次任务计划，默认采用 plans/TASK-PLAN-TEMPLATE.md。
      计划中必须写清：
      - 目标与成功标准
      - 是否影响主线业务（image compression + HEIC）
      - 风险等级（R0 / R1 / R2 / R3）
      - 是否涉及 SEO / 路由 / 图片 API / 隐私 / 首页与导航定位
      - 固定验收链与回退点

  - id: implement
    depends_on: [plan]
    type: loop
    loop:
      prompt: |
        根据计划执行下一项任务。
        默认采用单 agent 优先模式。
        优先复用现有 composables、blog-paths、blog-route-manifest、server/utils/image-api.ts。
        不要重新设计路径体系，不要跳过固定验收链。
      until: ALL_TASKS_COMPLETE
      max_iterations: 50

  - id: validate
    depends_on: [implement]
    type: bash
    command: |
      pnpm test
      pnpm exec eslint .
      pnpm build
    on_failure: |
      仅返回错误摘要、影响范围和修复建议，不要输出完整长日志。

  - id: review
    depends_on: [validate]
    type: prompt
    prompt: |
      执行 self-review，至少检查：
      - 是否仍符合“隐私优先的浏览器端图片处理站”定位
      - 是否固化了 SEO / 路由修复，而不是引入第二套路径逻辑
      - 是否补齐必要测试与风险说明
      - 是否需要更新 docs/session-state.md

  - id: approve
    depends_on: [review]
    type: approval
    prompt: |
      如果本次任务属于 R3，或触及部署 / 安全 / 隐私承诺，请等待人工批准后继续。

  - id: finish
    depends_on: [approve]
    type: prompt
    prompt: |
      1. 更新 docs/session-state.md
      2. 汇总变更、风险、测试结果
      3. 明确输出：session-state.md 已更新
