<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- 光泽效果 -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#shine)" opacity="0.4"/>
  <!-- T 字母 -->
  <text x="256" y="340" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="320" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central" letter-spacing="-10">T</text>
  <!-- 底部小点装饰 - 代表工具的多样性 -->
  <circle cx="176" cy="420" r="18" fill="rgba(255,255,255,0.6)"/>
  <circle cx="256" cy="420" r="18" fill="rgba(255,255,255,0.8)"/>
  <circle cx="336" cy="420" r="18" fill="rgba(255,255,255,0.6)"/>
</svg>
